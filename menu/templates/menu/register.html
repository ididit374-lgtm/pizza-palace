<!DOCTYPE html>
<html>
<head><title>Register – Pizza Palace</title>
<style>
  body { font-family: Arial, sans-serif; max-width: 420px; margin: 80px auto; padding: 20px; background: #fff8f0; }
  h1 { color: #c0392b; text-align: center; }
  .card { background: white; border-radius: 12px; padding: 28px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  input { width: 100%; padding: 10px; margin: 8px 0 16px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 1em; }
  button { width: 100%; background: #c0392b; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 1.1em; cursor: pointer; }
  button:hover { background: #a93226; }
  .helptext { font-size: 0.8em; color: #888; margin-top: -10px; margin-bottom: 10px; }
  .errorlist { color: #c0392b; font-size: 0.85em; padding-left: 16px; }
  .link { text-align: center; margin-top: 14px; }
  a { color: #c0392b; }
  label { font-weight: bold; font-size: 0.9em; }
</style>
</head>
<body>
  <h1>🍕 Pizza Palace</h1>
  <div class="card">
    <h2 style="margin-top:0">Create Account</h2>
    <form method="post">
      {% csrf_token %}
      {% for field in form %}
        <label>{{ field.label }}</label>
        {{ field }}
        {% if field.help_text %}<div class="helptext">{{ field.help_text }}</div>{% endif %}
        {% if field.errors %}<ul class="errorlist">{% for e in field.errors %}<li>{{ e }}</li>{% endfor %}</ul>{% endif %}
      {% endfor %}
      <button type="submit">Register</button>
    </form>
    <div class="link">Already have an account? <a href="{% url 'login' %}">Login</a></div>
  </div>
</body>
</html>
