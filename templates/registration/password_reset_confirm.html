<!DOCTYPE html>
<html>
<head><title>New Password – Pizza Palace</title>
<style>
  body { font-family: Arial, sans-serif; max-width: 420px; margin: 80px auto; padding: 20px; background: #fff8f0; }
  h1 { color: #c0392b; text-align: center; }
  .card { background: white; border-radius: 12px; padding: 28px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  input { width: 100%; padding: 10px; margin: 8px 0 16px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 1em; }
  button { width: 100%; background: #c0392b; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 1.1em; cursor: pointer; }
  button:hover { background: #a93226; }
  a { color: #c0392b; }
  .link { text-align: center; margin-top: 14px; }
  p { color: #555; }
</style>
</head>
<body>
  <h1>🍕 Pizza Palace</h1>
  <div class="card">
    <h2 style="margin-top:0">Enter New Password</h2>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Set New Password</button>
    </form>
    <div class="link"><a href="/login/">← Back to Login</a></div>
  </div>
</body>
</html>
